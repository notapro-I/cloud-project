apiVersion: v1
kind: ConfigMap
metadata:
  name: llmobs-prometheus-config
  labels:
    app: llmobs-prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: llmobs-api
        metrics_path: /metrics
        static_configs:
          - targets: ['llmobs-api:8000']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmobs-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llmobs-prometheus
  template:
    metadata:
      labels:
        app: llmobs-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - mountPath: /etc/prometheus
              name: config
      volumes:
        - name: config
          configMap:
            name: llmobs-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: llmobs-prometheus
spec:
  selector:
    app: llmobs-prometheus
  ports:
    - port: 9090
      targetPort: 9090
