apiVersion: 1

groups:
  - orgId: 1
    name: quality-alerts
    folder: LLM Observability Alerts
    interval: 1m
    rules:
      - uid: quality-threshold-breach
        title: Quality threshold breach
        condition: C
        data:
          - refId: A
            datasourceUid: PostgreSQL
            relativeTimeRange:
              from: 600
              to: 0
            model:
              format: time_series
              rawSql: |
                WITH recent AS (
                  SELECT COALESCE(NULLIF(TRIM(r.prompt_version), ''), 'unversioned') AS prompt_version,
                         q.score,
                         ROW_NUMBER() OVER (
                           PARTITION BY COALESCE(NULLIF(TRIM(r.prompt_version), ''), 'unversioned')
                           ORDER BY q.created_at DESC
                         ) AS rn
                  FROM quality_scores q
                  JOIN llm_requests r ON r.id = q.request_id
                )
                SELECT NOW() AS time,
                       prompt_version AS metric,
                       AVG(score) AS value
                FROM recent
                WHERE rn <= 5
                GROUP BY prompt_version
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              params:
                - 4
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: Quality average dropped to 4 or below for a prompt version
          description: Average quality score over the last 5 samples is 4 or lower for at least one prompt version.
        labels:
          severity: warning
