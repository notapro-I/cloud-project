version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-llmobs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmobs}
      POSTGRES_DB: ${POSTGRES_DB:-llmobs}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-llmobs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./worker
    env_file:
      - .env.example
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      API_BASE_URL: http://api:8000
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:0.3.12
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.1.4
    env_file:
      - .env.example
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
  ollama_data:
